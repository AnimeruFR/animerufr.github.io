# =====================================================================
# CI de l'encyclopédie Re:Zero (C8)
# - test : intégrité des données (Vitest) + build de production (vite-ssg)
# - deploy : publication GitHub Pages du dossier dist/ (branche main)
#
# Prérequis une fois le dépôt poussé sur GitHub :
#   1. Settings → Pages → Source : « GitHub Actions ».
#   2. Si le site est servi sous /<nom-du-repo>/ (pages de projet),
#      ajouter `base: '/<nom-du-repo>/'` dans vite.config.js.
# =====================================================================
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Tests d'intégrité des données
        run: npm test
      - name: Build de production (SSG + PWA)
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        if: github.ref == 'refs/heads/main'
        with:
          path: dist

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
